<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ProCV Lite – AI-Powered CV Builder</title>
    <meta name="description" content="ProCV Lite is an AI-powered CV builder. Create ATS-friendly resumes, track views, and land your dream job." />
    <!-- Flash prevention: apply stored theme before React hydrates -->
    <script>
      (function() {
        try {
          var theme = localStorage.getItem('procv_theme_preference') || 'dark';
          var actual = theme === 'system'
            ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light')
            : theme;
          document.documentElement.setAttribute('data-theme', actual);
          document.documentElement.classList.add(actual);
        } catch(e) {
          document.documentElement.setAttribute('data-theme', 'dark');
          document.documentElement.classList.add('dark');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
